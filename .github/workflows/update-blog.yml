name: Update Blog JSON

on:
  repository_dispatch:
    types: [update-blog]
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  update-blog:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Fetch blog posts
        run: node scripts/fetch-blog.mjs

      - name: Commit blog.json if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public/blog.json
          git commit -m "Update blog.json"
          git push

      - name: Configure GitHub token
        env:
          GH_TOKEN: ${{ secrets.BLOG_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Build and deploy
        env:
          GH_TOKEN: ${{ secrets.BLOG_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.BLOG_UPDATE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npm run deploy
